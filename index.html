<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud CRUD</title>
    <!-- Modern Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Icons (Boxicons) -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <!-- Background Animated Shapes (Glassmorphism Magic) -->
    <div class="bg-shape shape1"></div>
    <div class="bg-shape shape2"></div>
    <div class="bg-shape shape3"></div>

    <div class="container glass">
        <header>
            <div class="icon-wrapper">
                <i class='bx bx-cloud'></i>
            </div>
            <h1>Cloud CRUD</h1>
            <p>Sincronização em tempo real</p>
        </header>

        <form id="formularioCliente">
            <input type="hidden" id="clienteId">
            
            <div class="input-box">
                <label for="nomeCliente">Nome Completo</label>
                <div class="input-wrapper">
                    <i class='bx bx-user'></i>
                    <input type="text" id="nomeCliente" placeholder="Ex: João da Silva" required>
                </div>
            </div>
            
            <div class="input-box">
                <label for="emailCliente">Endereço de E-mail</label>
                <div class="input-wrapper">
                    <i class='bx bx-envelope'></i>
                    <input type="email" id="emailCliente" placeholder="Ex: joao@email.com" required>
                </div>
            </div>

            <button type="submit" class="btn-submit">
                <i class='bx bx-save'></i> Salvar Registro
            </button>
        </form>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>Email</th>
                        <th>Opções</th>
                    </tr>
                </thead>
                <tbody id="corpoTabelaClientes"></tbody>
            </table>
        </div>
    </div>
    
    <script type="module" src="./app.js"></script>
</body>
</html>
